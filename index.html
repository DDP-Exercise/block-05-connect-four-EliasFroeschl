<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connect Four</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!--TODO: Build the Markup for your Game. Don't forget to style it in a cascading stylesheet. -->

<div id="game-layout">
    <div id="mario-figure" class="side-fighter"></div>

    <main id="game">
        <header id="game-header">
            <h1>Mario vs. Bowser</h1>
            <p>Connect four to save Princess Peach.</p>
        </header>

        <section id="player-info">
            <p id="current-player">Current player: Mario</p>
            <p id="game-message">Choose a column to drop your stone.</p>
        </section>

        <section id="column-buttons"></section>
        <section id="battlefield"></section>

        <button id="restart-button">Restart Game</button>
    </main>

    <div id="bowser-figure" class="side-fighter"></div>
</div>

<script type="module" src="js/controller.connectfour.js"></script>
</body>
</html>
